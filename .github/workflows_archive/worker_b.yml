name: Worker B Shift
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Source of trigger'
        required: false
        default: 'GitHub_Cron'

concurrency:
  group: worker-b-shift
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      # --- مفاتيح المركبة ---
      WORKER_ID: "Worker_B"
      TRIGGER_SOURCE: ${{ github.event.inputs.trigger_source || 'GitHub_Cron' }}
      ACTIVE_TASK: "eur_usd_fetcher"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SYSTEM_BOT_TOKEN: ${{ secrets.SYSTEM_BOT_TOKEN }}
      SYSTEM_CHAT_ID: ${{ secrets.SYSTEM_CHAT_ID }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      # --- مفاتيح السائق ---
      API_KEY: ${{ secrets.KEY_B }}
      TASK_BOT_TOKEN: ${{ secrets.TASK_BOT_TOKEN }}
      TASK_CHAT_ID: ${{ secrets.TASK_CHAT_ID }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase redis python-dotenv
      - name: Run Worker Engine
        run: python workers/main.py