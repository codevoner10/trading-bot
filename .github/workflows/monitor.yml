name: 24/7 Monitoring Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      worker_id:
        description: 'Worker ID (e.g. Worker_A)'
        required: false
        default: 'Worker_A'

concurrency:
  group: monitoring-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Worker
        run: python worker.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          WORKER_ID: ${{ github.event.inputs.worker_id || 'Worker_A' }}
          HEARTBEAT_INTERVAL: '60'
          CLAIM_TIMEOUT: '300'
          MAX_RUNTIME_MINUTES: '330'