name: 24/7 Monitoring Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      worker_id:
        description: 'Worker ID (optional, auto-generated if empty)'
        required: false
        default: ''

concurrency:
  group: monitoring-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      WORKER_ID: ${{ github.event.inputs.worker_id || format('Worker_{0}', github.run_id) }}
      HEARTBEAT_INTERVAL: '60'
      CLAIM_TIMEOUT: '300'
      MAX_RUNTIME_MINUTES: '330'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Worker
        run: python worker.py