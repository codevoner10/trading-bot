name: Worker D Shift
on:
  schedule:
    - cron: '0 12 * * *'  # يبدأ يومياً الساعة 12:00 UTC
  workflow_dispatch:

concurrency:
  group: worker-d-shift
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WORKER_ID: "Worker_D"
      API_KEY: ${{ secrets.KEY_D }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase redis python-dotenv

      - name: Run Worker Engine
        run: python workers/main.py