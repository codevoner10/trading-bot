name: Watchdog Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests redis

      - name: Run Watchdog
        run: python watchdog.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          WATCHDOG_NAME: 'watchdog-1'
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}