name: Check Secrets Format
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "URL length: ${#SUPABASE_URL}"
          echo "KEY length: ${#SUPABASE_KEY}"
          echo "REDIS length: ${#UPSTASH_REDIS_URL}"
          
          # التحقق من وجود علامات تنصيص
          if [[ "$SUPABASE_URL" == \"*\" ]]; then
            echo "❌ SUPABASE_URL has quotes!"
          else
            echo "✅ SUPABASE_URL no quotes"
          fi
          
          if [[ "$SUPABASE_KEY" == \"*\" ]]; then
            echo "❌ SUPABASE_KEY has quotes!"
          else
            echo "✅ SUPABASE_KEY no quotes"
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}