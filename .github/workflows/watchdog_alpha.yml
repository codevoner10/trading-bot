name: Watchdog Alpha Shift
on:
  schedule:
    # يبدأ الساعة 00:00، 05:00، 10:00، 15:00، 20:00 (بتوقيت UTC)
    - cron: '0 0,5,10,15,20 * * *'
  workflow_dispatch:

jobs:
  run-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WATCHDOG_ID: "Alpha"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # GitHub API Credentials
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}         # <-- تم التعديل هنا
      REPO_NAME: ${{ secrets.REPO_NAME }}         # <-- تأكد من إضافته في الأسرار

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase redis python-dotenv

      - name: Run Watchdog Engine
        run: python watchdog/main.py