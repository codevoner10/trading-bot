name: Watchdog Alpha Shift
on:
  schedule:
    # يبدأ الساعة 00:00، 05:00، 10:00، 15:00، 20:00 UTC (كل 5 ساعات للتأكد من التبادل)
    - cron: '0 0,5,10,15,20 * * *'
  workflow_dispatch:

# صلاحيات الكتابة ضرورية لتمكين الكلب من تشغيل الـ Workflows الأخرى عبر API
permissions:
  actions: write
  contents: read

jobs:
  run-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WATCHDOG_ID: "Alpha"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # مفتاح GitHub المدمج تلقائياً (لا تحتاج لإضافته في Secrets)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ secrets.GITHUB_REPO }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Watchdog Engine
        run: python watchdog/main.py