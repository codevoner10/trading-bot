name: Worker E Shift
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python worker.py
        env:
          WORKER_NAME: "Worker_E"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_MARKET: ${{ secrets.TELEGRAM_CHAT_ID_MARKET }}
          TWELVEDATA_KEY_E: ${{ secrets.TWELVEDATA_KEY_E }}
          TWELVEDATA_KEY_BACKUP: ${{ secrets.TWELVEDATA_KEY_BACKUP }}
          SYMBOL: "EUR/USD"