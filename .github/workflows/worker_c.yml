name: Worker C Shift
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Source of trigger'
        required: false
        default: 'GitHub_Cron'

concurrency:
  group: worker-c-shift
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WORKER_ID: "Worker_C"
      API_KEY: ${{ secrets.KEY_C }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      REPO_NAME: ${{ secrets.REPO_NAME }}
      TRIGGER_SOURCE: ${{ github.event.inputs.trigger_source || 'GitHub_Cron' }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase redis python-dotenv

      - name: Run Worker Engine
        run: python workers/main.py