name: Watchdog Beta Shift
on:
  schedule:
    # يبدأ الساعة 02:30، 07:30، 12:30، 17:30، 22:30 (بتوقيت UTC)
    - cron: '30 2,7,12,17,22 * * *'
  workflow_dispatch:

jobs:
  run-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WATCHDOG_ID: "Beta"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # GitHub API Credentials
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}         # <-- تم التعديل هنا
      REPO_NAME: ${{ secrets.REPO_NAME }}         # <-- تأكد من إضافته في الأسرار

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase redis python-dotenv

      - name: Run Watchdog Engine
        run: python watchdog/main.py