name: Backup Worker Z (Emergency)
on:
  workflow_dispatch:  # يتم استدعاؤه فقط بواسطة الـ Watchdog

concurrency:
  group: backup-worker-z
  cancel-in-progress: false

jobs:
  run-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WORKER_ID: "Backup_Z"
      API_KEY: ${{ secrets.KEY_BACKUP }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase redis python-dotenv

      - name: Run Backup Engine
        run: python workers/main.py